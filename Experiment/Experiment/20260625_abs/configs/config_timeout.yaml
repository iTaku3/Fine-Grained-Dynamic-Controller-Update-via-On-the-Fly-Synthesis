outputDir: Experiment/20260623/result_timeout
timeoutHours: 12

javaOptions:
  - -Dmtsa.evaluation.enabled=true
  - -Dotfduc.nondet.belief.repair=true
  - -Xmx220G
  # If the experiment PC has enough memory, uncomment and adjust this:
  # - -Xmx240G

cases:
  # On-the-fly (minimum)
  - id: railcab_otf_minimum_r1
    example: "Railcab"
    method: OTF-MINIMUM
    variant: R1
    lts: "Experiment/20260623/models/Railcab_FG.lts"
    target: UpdCont_OTF_FG_R1
  - id: surveillance_otf_minimum_r1
    example: "Surveillance"
    method: OTF-MINIMUM
    variant: R1
    lts: "Experiment/20260623/models/Surveillance_FG.lts"
    target: UpdCont_OTF_FG_R1

  # traditional (monolithic) + abstruction
  - id: industry_traditional_abstruction_r2
    example: "Industry"
    method: Traditional
    variant: R2
    lts: "Experiment/20260623/models/Industry_FG.lts"
    target: UpdCont_SFG_R2
  - id: railcab_traditional_abstruction_r2
    example: "Railcab"
    method: Traditional
    variant: R2
    lts: "Experiment/20260623/models/Railcab_FG.lts"
    target: UpdCont_SFG_R2
  - id: productioncell_arm1_traditional_abstruction_r2
