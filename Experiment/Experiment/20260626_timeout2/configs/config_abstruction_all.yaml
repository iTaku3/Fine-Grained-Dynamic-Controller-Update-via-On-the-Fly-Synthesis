outputDir: Experiment/20260626_timeout2/result
timeoutHours: 12

javaOptions:
  - -Dmtsa.evaluation.enabled=true
  - -Dotfduc.nondet.belief.repair=false
  - -Xmx220G
  # If the experiment PC has enough memory, uncomment and adjust this:
  # - -Xmx240G

cases:
# traditional (monolithic) + abstruction / TIMEOUT only
  - id: industry_traditional_abstruction_r2
    example: "Industry"
    method: Traditional
    variant: R2
    lts: "Experiment/20260626_abs/models/Industry_FG.lts"
    target: UpdCont_SFG_R2

  - id: railcab_traditional_abstruction_r2
    example: "Railcab"
    method: Traditional
    variant: R2
    lts: "Experiment/20260626_abs/models/Railcab_FG.lts"
    target: UpdCont_SFG_R2

  - id: productioncell_arm1_traditional_abstruction_r2
    example: "ProductionCell_Arms=1"
    method: Traditional
    variant: R2
    lts: "Experiment/20260626_abs/models/ProductionCell_Arms=1_FG.lts"
    target: UpdCont_SFG_R2

  - id: productioncell_arm2_traditional_abstruction
    example: "ProductionCell_Arms=2"
    method: Traditional
    variant: none
    lts: "Experiment/20260626_abs/models/ProductionCell_Arms=2_FG.lts"
    target: UpdCont_SFG

  - id: productioncell_arm2_traditional_abstruction_r1
    example: "ProductionCell_Arms=2"
    method: Traditional
    variant: R1
    lts: "Experiment/20260626_abs/models/ProductionCell_Arms=2_FG.lts"
    target: UpdCont_SFG_R1