outputDir: Experiment/20260626_timeout3/result
timeoutHours: 12

javaOptions:
  - -Dmtsa.evaluation.enabled=true
  - -Dotfduc.nondet.belief.repair=false
  - -Xmx220G
  # If the experiment PC has enough memory, uncomment and adjust this:
  # - -Xmx240G

cases:
# traditional (monolithic) / TIMEOUT only
  - id: industry_traditional
    example: "Industry"
    method: Traditional
    variant: none
    lts: "Experiment/20260626_no_abs/models/Industry_FG.lts"
    target: UpdCont_SFG

  - id: industry_traditional_r1
    example: "Industry"
    method: Traditional
    variant: R1
    lts: "Experiment/20260626_no_abs/models/Industry_FG.lts"
