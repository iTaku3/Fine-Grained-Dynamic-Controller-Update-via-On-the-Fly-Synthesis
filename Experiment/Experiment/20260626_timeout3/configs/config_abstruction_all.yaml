  - id: railcab_traditional
    example: "Railcab"
    method: Traditional
    variant: none
    lts: "Experiment/20260626_no_abs/models/Railcab_FG.lts"
    target: UpdCont_SFG

  - id: workflow_traditional_r1
    example: "Workflow"
    method: Traditional
    variant: R1
    lts: "Experiment/20260626_no_abs/models/Workflow_FG.lts"
